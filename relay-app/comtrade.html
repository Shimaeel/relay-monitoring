<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMTRADE Files — Relay Monitoring</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-shell">
    <div class="main-wrapper">
      <main class="main-content">

        <!-- Page Title -->
        <div class="page-title-bar">
          <div class="page-title-bar__left">
            <h1 class="page-title">📁 COMTRADE Files</h1>
            <p class="page-subtitle">
              All COMTRADE files from all connected relays — auto-collected by the backend FILE DIR EVENTS state machine.
            </p>
          </div>
          <div class="page-title-bar__actions">
            <a href="index.html" class="btn btn--outline">← Back to Dashboard</a>
          </div>
        </div>

        <!-- ===== COMBINE COMTRADE (auto, FSM-driven, no fetch button) ===== -->
        <div id="combine-comtrade-section" class="section-card">
          <h2>📁 All Relays — COMTRADE Files (.cfg / .dat)</h2>

          <div class="ser-toolbar">
            <div class="ser-toolbar__left">
              <span>Total Files: <strong id="ctf-count" class="record-count">0</strong></span>
              <span class="ser-toolbar__sep">|</span>
              <span style="font-weight:700">🟢 Live — pushed by backend</span>
            </div>
            <div class="ser-toolbar__right">
              <button id="ctf-export-btn" class="btn btn--primary btn--sm" type="button">
                📦 Export COMTRADE (.zip)
              </button>
            </div>
          </div>

          <div class="ser-config">
            <div class="ser-config__field">
              <label>Relay</label>
              <input id="ctf-f-relay" class="input" type="text" placeholder="e.g. SEL-751" />
            </div>
            <div class="ser-config__field">
              <label>Substation</label>
              <input id="ctf-f-substation" class="input" type="text" placeholder="e.g. Alpha" />
            </div>
            <div class="ser-config__field">
              <label>Date</label>
              <input id="ctf-f-date" class="input" type="text" placeholder="01/15/2026" />
            </div>
            <div class="ser-config__field">
              <label>File name</label>
              <input id="ctf-f-name" class="input" type="text" placeholder="HIS_…" />
            </div>
          </div>

          <div id="ctf-list" class="ctf-file-list">
            <div class="set-empty">Waiting for COMTRADE files…</div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="js/comtrade_live.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      if (typeof window.initComtradeLive === "function") {
        window.initComtradeLive({
          containerId:     "ctf-list",
          countId:         "ctf-count",
          scopeRelayId:    null,       // all relays
          showRelayColumn: true,
          filtersPrefix:   "ctf"
        });
      }
    });
  </script>
</body>
</html>
