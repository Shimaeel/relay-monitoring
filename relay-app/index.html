<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Monitoring Dashboard</title>
  <!-- Tabulator (local) -->
  <link rel="stylesheet" href="css/tabulator_modern.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <span class="loading-text">Loading dashboard…</span>
  </div>

  <div class="app-shell">

    <!-- ===== Main Wrapper ===== -->
    <div class="main-wrapper">

      <!-- Main Content -->
      <main id="main-content" class="main-content">

        <!-- Page Title -->
        <div class="page-title-bar">
          <div class="page-title-bar__left">
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Monitor and manage all connected relay devices</p>
          </div>
          <div class="page-title-bar__actions">
            <a href="comtrade.html" class="btn btn--outline">📁 Open COMTRADE</a>
            <button id="refresh-btn" class="btn btn--outline" type="button">
              ⟳ Refresh
            </button>
          </div>
        </div>

        <!-- Add Relay Form -->
        <div class="section-card add-relay-form" style="margin-bottom:var(--sp-6)">
          <h2>➕ Add Relay</h2>
          <form id="add-relay-form" class="add-relay-form__fields" autocomplete="off">
            <div class="add-relay-form__field">
              <label for="relay-name-input">Relay Name</label>
              <input
                type="text"
                id="relay-name-input"
                class="input"
                placeholder="e.g. SEL-735"
                required
              />
            </div>
            <div class="add-relay-form__field">
              <label for="relay-ip-input">IP Address</label>
              <input
                type="text"
                id="relay-ip-input"
                class="input"
                placeholder="e.g. 192.168.0.1"
                required
              />
            </div>
            <div class="add-relay-form__field">
              <label for="relay-port-input">Port</label>
              <input
                type="number"
                id="relay-port-input"
                class="input"
                placeholder="e.g. 23"
                min="1"
                max="65535"
                required
              />
            </div>
            <div class="add-relay-form__action">
              <button type="submit" class="btn btn--primary">➕ Add Relay</button>
            </div>
          </form>
        </div>

        <!-- Search Toolbar -->
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-wrap__icon">🔍</span>
            <input
              type="text"
              id="search-input"
              class="input"
              placeholder="Search by name, IP, or substation…"
              aria-label="Search relays"
            />
          </div>
        </div>

        <!-- Relay Card Grid -->
        <div id="relay-grid" class="relay-grid" aria-label="Relay devices">
          <!-- Cards injected by dashboard.js -->
        </div>

        <!-- ===== COMBINE SER SECTION ===== -->
        <div id="combine-ser-section" class="section-card" style="margin-top:var(--sp-5)">
          <h2>📋 Combine SER</h2>

          <!-- Toolbar -->
          <div class="ser-toolbar">
            <div class="ser-toolbar__left">
              <span>Total Records: <strong id="cser-record-count" class="record-count">0</strong></span>
              <span class="ser-toolbar__sep">|</span>
              <span class="ser-toolbar__update">Last updated: <span id="cser-last-update">—</span></span>
              <span class="ser-toolbar__sep">|</span>
              <span id="cser-conn-status" style="font-weight:700">🟡 Connecting…</span>
            </div>
            <div class="ser-toolbar__right">
              <button class="btn btn--outline btn--sm" onclick="cserExportCSV()">📥 Export CSV</button>
              <button class="btn btn--primary btn--sm" onclick="cserRefreshAll()">🔄 Refresh</button>
              <button class="btn btn--danger btn--sm"  onclick="cserDisconnectAll()">⏹ Disconnect</button>
            </div>
          </div>

          <!-- Connection Config -->
          <div class="ser-config">
            <div class="ser-config__field">
              <label>Poll Rate</label>
              <div class="ser-config__input-group">
                <input id="cser-poll-rate" type="number" min="250" step="250" value="2000" />
                <span class="ser-config__suffix">ms</span>
              </div>
            </div>
            <button class="btn btn--primary btn--sm" onclick="cserConnectAll()">Connect All</button>
          </div>

          <!-- Tabulator Table -->
          <div id="combine-ser-table"></div>
        </div>
        <!-- ===== END COMBINE SER ===== -->

      </main>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Remove Relay Confirmation Modal -->
  <div id="confirm-modal" class="confirm-modal" aria-hidden="true">
    <div class="confirm-modal__backdrop"></div>
    <div class="confirm-modal__dialog" role="dialog" aria-labelledby="confirm-modal-title" aria-describedby="confirm-modal-desc">
      <div class="confirm-modal__icon">⚠️</div>
      <h3 id="confirm-modal-title" class="confirm-modal__title">Remove Relay</h3>
      <p id="confirm-modal-desc" class="confirm-modal__desc">Are you sure you want to remove this relay?</p>
      <div class="confirm-modal__details">
        <span id="confirm-modal-name" class="confirm-modal__relay-name"></span>
        <span id="confirm-modal-ip" class="confirm-modal__relay-ip"></span>
      </div>
      <div class="confirm-modal__actions">
        <button id="confirm-modal-cancel" class="btn btn--outline" type="button">Cancel</button>
        <button id="confirm-modal-confirm" class="btn btn--danger" type="button">Remove</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/tabulator.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/ring_buffer.js"></script>
  <script src="js/combine_ser.js"></script>
</body>
</html>
