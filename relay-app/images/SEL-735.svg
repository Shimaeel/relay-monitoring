<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 660" width="580" height="660">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#2d3f6e"/>
      <stop offset="50%" stop-color="#253464"/>
      <stop offset="100%" stop-color="#1c2a52"/>
    </linearGradient>
    <linearGradient id="lcdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2dce8"/>
      <stop offset="100%" stop-color="#9ec8dc"/>
    </linearGradient>
    <linearGradient id="navBtnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4e5f88"/>
      <stop offset="100%" stop-color="#2e3d6a"/>
    </linearGradient>
    <linearGradient id="sidePanelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2440"/>
      <stop offset="100%" stop-color="#111b33"/>
    </linearGradient>
    <radialGradient id="pushCapGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a3555"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </radialGradient>
    <radialGradient id="knobGrad" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#3a4870"/>
      <stop offset="100%" stop-color="#0e1628"/>
    </radialGradient>
    <radialGradient id="portGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <filter id="deviceShadow" x="-8%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="134" y="296" width="156" height="202" rx="3"/>
    </clipPath>
  </defs>

  <!-- DEVICE BODY -->
  <rect x="18" y="12" width="544" height="630" rx="22" ry="22" fill="url(#bodyGrad)" filter="url(#deviceShadow)"/>
  <rect x="22" y="16" width="536" height="622" rx="19" ry="19" fill="none" stroke="#3a5090" stroke-width="1.2" opacity="0.6"/>

  <!-- TOP HEADER BAR -->
  <rect x="18" y="12" width="544" height="60" rx="22" ry="22" fill="#1b2a50"/>
  <rect x="18" y="42" width="544" height="30" fill="#1b2a50"/>

  <!-- SEL LOGO BOX -->
  <rect x="34" y="19" width="58" height="44" rx="5" fill="#0e1930" stroke="#1e3870" stroke-width="1.5"/>
  <text x="63" y="36" font-family="Arial Black,Arial,sans-serif" font-size="14" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">SEL</text>
  <line x1="36" y1="40" x2="90" y2="40" stroke="#1e3870" stroke-width="1"/>
  <text x="63" y="56" font-family="Arial,sans-serif" font-size="4.2" fill="#5880b0" text-anchor="middle">SCHWEITZER</text>

  <!-- COMPANY NAME -->
  <text x="100" y="30" font-family="Arial,sans-serif" font-size="7" fill="#6888b8" letter-spacing="0.6">SCHWEITZER</text>
  <text x="100" y="40" font-family="Arial,sans-serif" font-size="7" fill="#6888b8" letter-spacing="0.6">ENGINEERING</text>
  <text x="100" y="50" font-family="Arial,sans-serif" font-size="7" fill="#6888b8" letter-spacing="0.6">LABORATORIES</text>

  <!-- MODEL NUMBER -->
  <text x="320" y="34" font-family="Arial Black,Arial,sans-serif" font-size="23" font-weight="900" fill="white" letter-spacing="0.8">SEL-735</text>
  <text x="320" y="52" font-family="Arial,sans-serif" font-size="9" fill="#90b0d0" letter-spacing="0.7">POWER QUALITY AND REVENUE METER</text>

  <!-- LCD DISPLAY -->
  <rect x="34" y="82" width="316" height="106" rx="8" fill="#0d1428" stroke="#253558" stroke-width="2.5"/>
  <rect x="40" y="88" width="304" height="94" rx="5" fill="url(#lcdGrad)"/>
  <rect x="40" y="88" width="304" height="94" rx="5" fill="none" stroke="#7ab0c8" stroke-width="0.6" opacity="0.5"/>
  <text x="56" y="113" font-family="Courier New,Courier,monospace" font-size="13.5" fill="#2a4a6a" letter-spacing="1.2">WH3_DEL</text>
  <text x="186" y="113" font-family="Courier New,Courier,monospace" font-size="13.5" fill="#2a4a6a">&lt;kWh&gt;</text>
  <text x="56" y="164" font-family="Courier New,Courier,monospace" font-size="52" font-weight="bold" fill="#183258" letter-spacing="4">735.00</text>

  <!-- NAV BUTTONS -->
  <!-- RESET -->
  <rect x="34" y="202" width="70" height="36" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <text x="69" y="224" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">RESET</text>

  <!-- ESC -->
  <rect x="114" y="202" width="56" height="36" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <text x="142" y="215" font-family="Arial,sans-serif" font-size="9" fill="#aabee0" text-anchor="middle">&#x21A9;</text>
  <text x="142" y="230" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">ESC</text>

  <!-- LEFT arrow -->
  <rect x="180" y="202" width="44" height="36" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <polygon points="198,220 210,210 210,230" fill="white"/>

  <!-- UP arrow -->
  <rect x="234" y="188" width="44" height="34" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <polygon points="256,194 244,212 268,212" fill="white"/>

  <!-- DOWN arrow -->
  <rect x="234" y="228" width="44" height="34" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <polygon points="256,256 244,238 268,238" fill="white"/>

  <!-- RIGHT arrow -->
  <rect x="288" y="202" width="44" height="36" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <polygon points="302,220 302,210 316,220 302,230" fill="white"/>

  <!-- ENT -->
  <rect x="342" y="202" width="44" height="36" rx="8" fill="url(#navBtnGrad)" stroke="#5060a0" stroke-width="1.5"/>
  <text x="364" y="215" font-family="Arial,sans-serif" font-size="9" fill="#aabee0" text-anchor="middle">&#x21B5;</text>
  <text x="364" y="230" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">ENT</text>

  <!-- TEST LABEL + KNOB -->
  <text x="248" y="278" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">TEST</text>
  <circle cx="248" cy="310" r="28" fill="#141e38" stroke="#3a4a78" stroke-width="2"/>
  <circle cx="248" cy="310" r="21" fill="url(#knobGrad)" stroke="#4a5a88" stroke-width="1.2"/>
  <circle cx="248" cy="310" r="13" fill="#0d1528" stroke="#2a3860" stroke-width="1"/>
  <circle cx="248" cy="292" r="4" fill="#7090c0"/>

  <!-- LED INDICATORS -->
  <!-- ENABLED -->
  <circle cx="46" cy="296" r="7" fill="#00e040" filter="url(#greenGlow)"/>
  <circle cx="46" cy="296" r="3.5" fill="#80ffb0" opacity="0.9"/>
  <text x="62" y="300" font-family="Arial,sans-serif" font-size="10" fill="white">ENABLED</text>
  <line x1="34" y1="312" x2="160" y2="312" stroke="#2a3a60" stroke-width="0.7" opacity="0.5"/>

  <!-- VAB ON -->
  <circle cx="46" cy="328" r="7" fill="#00e040" filter="url(#greenGlow)"/>
  <circle cx="46" cy="328" r="3.5" fill="#80ffb0" opacity="0.9"/>
  <text x="62" y="332" font-family="Arial,sans-serif" font-size="10" fill="white">VAB ON</text>

  <!-- VBC ON -->
  <circle cx="46" cy="350" r="7" fill="#00e040" filter="url(#greenGlow)"/>
  <circle cx="46" cy="350" r="3.5" fill="#80ffb0" opacity="0.9"/>
  <text x="62" y="354" font-family="Arial,sans-serif" font-size="10" fill="white">VBC ON</text>

  <!-- VCA ON -->
  <circle cx="46" cy="372" r="7" fill="#00e040" filter="url(#greenGlow)"/>
  <circle cx="46" cy="372" r="3.5" fill="#80ffb0" opacity="0.9"/>
  <text x="62" y="376" font-family="Arial,sans-serif" font-size="10" fill="white">VCA ON</text>

  <!-- AUX 1 off -->
  <circle cx="46" cy="394" r="7" fill="#18243e" stroke="#2e3e60" stroke-width="1.2"/>
  <text x="62" y="398" font-family="Arial,sans-serif" font-size="10" fill="#4a5a7a">AUX 1</text>

  <!-- AUX 2 off -->
  <circle cx="46" cy="416" r="7" fill="#18243e" stroke="#2e3e60" stroke-width="1.2"/>
  <text x="62" y="420" font-family="Arial,sans-serif" font-size="10" fill="#4a5a7a">AUX 2</text>

  <!-- PORT F -->
  <text x="46" y="452" font-family="Arial,sans-serif" font-size="9" fill="#7898b8" letter-spacing="1.2">PORT F</text>
  <circle cx="80" cy="500" r="38" fill="#181818" stroke="#3a4860" stroke-width="2.5"/>
  <circle cx="80" cy="500" r="30" fill="url(#portGrad)" stroke="#222" stroke-width="1"/>
  <rect x="76" y="470" width="8" height="7" rx="2" fill="#2a2a2a" stroke="#444" stroke-width="0.5"/>
  <circle cx="63" cy="488" r="6" fill="#1e1e1e" stroke="#505050" stroke-width="1"/>
  <circle cx="63" cy="488" r="3" fill="#080808"/>
  <circle cx="97" cy="488" r="6" fill="#1e1e1e" stroke="#505050" stroke-width="1"/>
  <circle cx="97" cy="488" r="3" fill="#080808"/>
  <circle cx="58" cy="510" r="6" fill="#1e1e1e" stroke="#505050" stroke-width="1"/>
  <circle cx="58" cy="510" r="3" fill="#080808"/>
  <circle cx="102" cy="510" r="6" fill="#1e1e1e" stroke="#505050" stroke-width="1"/>
  <circle cx="102" cy="510" r="3" fill="#080808"/>
  <circle cx="80" cy="520" r="6" fill="#1e1e1e" stroke="#505050" stroke-width="1"/>
  <circle cx="80" cy="520" r="3" fill="#080808"/>

  <!-- CONFIGURATION CARD -->
  <g clip-path="url(#cardClip)">
    <rect x="134" y="296" width="156" height="202" fill="white"/>
    <rect x="134" y="296" width="156" height="15" fill="#cccccc"/>
    <text x="212" y="307" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#111" text-anchor="middle" letter-spacing="0.2">CONFIGURATION</text>
    <line x1="134" y1="311" x2="290" y2="311" stroke="#999" stroke-width="0.8"/>
    <line x1="163" y1="311" x2="163" y2="452" stroke="#cccccc" stroke-width="0.7"/>

    <!-- FM -->
    <text x="138" y="323" font-family="Arial,sans-serif" font-size="8.5" fill="#111">FM</text>
    <text x="167" y="323" font-family="Arial,sans-serif" font-size="8.5" fill="#111">5</text>
    <line x1="134" y1="327" x2="290" y2="327" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- CL -->
    <text x="138" y="339" font-family="Arial,sans-serif" font-size="8.5" fill="#111">CL</text>
    <text x="167" y="339" font-family="Arial,sans-serif" font-size="8.5" fill="#111">2/10/20</text>
    <line x1="134" y1="343" x2="290" y2="343" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- V -->
    <text x="138" y="355" font-family="Arial,sans-serif" font-size="8.5" fill="#111">V</text>
    <text x="167" y="355" font-family="Arial,sans-serif" font-size="8.5" fill="#111">28-277</text>
    <line x1="134" y1="359" x2="290" y2="359" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- (57-480) sub-row -->
    <text x="167" y="371" font-family="Arial,sans-serif" font-size="8" fill="#555">(57-480)</text>
    <line x1="134" y1="375" x2="290" y2="375" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- W -->
    <text x="138" y="387" font-family="Arial,sans-serif" font-size="8.5" fill="#111">W</text>
    <text x="167" y="387" font-family="Arial,sans-serif" font-size="8.5" fill="#111">3W&#x25B3;</text>
    <line x1="134" y1="391" x2="290" y2="391" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- Hz -->
    <text x="138" y="403" font-family="Arial,sans-serif" font-size="8.5" fill="#111">Hz</text>
    <text x="167" y="403" font-family="Arial,sans-serif" font-size="8.5" fill="#111">50</text>
    <line x1="134" y1="407" x2="290" y2="407" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- TA -->
    <text x="138" y="419" font-family="Arial,sans-serif" font-size="8.5" fill="#111">TA</text>
    <text x="167" y="419" font-family="Arial,sans-serif" font-size="8.5" fill="#111">0.25/2.5</text>
    <line x1="134" y1="423" x2="290" y2="423" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- Kt -->
    <text x="138" y="435" font-family="Arial,sans-serif" font-size="8.5" fill="#111">Kt</text>
    <text x="167" y="435" font-family="Arial,sans-serif" font-size="8.5" fill="#111">1.8</text>
    <line x1="134" y1="439" x2="290" y2="439" stroke="#e0e0e0" stroke-width="0.6"/>

    <!-- Footer divider -->
    <line x1="134" y1="452" x2="290" y2="452" stroke="#999" stroke-width="1"/>

    <!-- WATTHOUR METER footer -->
    <rect x="134" y="452" width="156" height="46" fill="#dddddd"/>
    <text x="212" y="468" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#222" text-anchor="middle">WATTHOUR</text>
    <text x="212" y="482" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#222" text-anchor="middle">METER</text>
  </g>
  <!-- Card outline (on top of clipped content) -->
  <rect x="134" y="296" width="156" height="202" rx="3" fill="none" stroke="#999" stroke-width="1"/>

  <!-- RIGHT SIDE PUSH BUTTONS -->
  <!-- TEST MODE -->
  <rect x="390" y="278" width="162" height="60" rx="10" fill="url(#sidePanelGrad)" stroke="#283a68" stroke-width="1.5"/>
  <circle cx="414" cy="308" r="17" fill="url(#pushCapGrad)" stroke="#3a4a78" stroke-width="1.8"/>
  <circle cx="414" cy="308" r="10" fill="#0c1222" stroke="#243058" stroke-width="1"/>
  <circle cx="414" cy="285" r="4.5" fill="#181818" stroke="#3a3a3a" stroke-width="0.8"/>
  <text x="438" y="287" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">TEST LED ON</text>
  <text x="438" y="306" font-family="Arial Black,Arial,sans-serif" font-size="12" font-weight="900" fill="white">TEST MODE</text>
  <text x="438" y="323" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">TEST LED OFF</text>

  <!-- DISPLAY -->
  <rect x="390" y="346" width="162" height="60" rx="10" fill="url(#sidePanelGrad)" stroke="#283a68" stroke-width="1.5"/>
  <circle cx="414" cy="376" r="17" fill="url(#pushCapGrad)" stroke="#3a4a78" stroke-width="1.8"/>
  <circle cx="414" cy="376" r="10" fill="#0c1222" stroke="#243058" stroke-width="1"/>
  <circle cx="414" cy="353" r="4.5" fill="#181818" stroke="#3a3a3a" stroke-width="0.8"/>
  <text x="438" y="355" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">NORMAL</text>
  <text x="438" y="374" font-family="Arial Black,Arial,sans-serif" font-size="12" font-weight="900" fill="white">DISPLAY</text>
  <text x="438" y="391" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">ALTERNATE</text>

  <!-- WAVEFORM -->
  <rect x="390" y="414" width="162" height="60" rx="10" fill="url(#sidePanelGrad)" stroke="#283a68" stroke-width="1.5"/>
  <circle cx="414" cy="444" r="17" fill="url(#pushCapGrad)" stroke="#3a4a78" stroke-width="1.8"/>
  <circle cx="414" cy="444" r="10" fill="#0c1222" stroke="#243058" stroke-width="1"/>
  <circle cx="414" cy="421" r="4.5" fill="#181818" stroke="#3a3a3a" stroke-width="0.8"/>
  <text x="438" y="423" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">CAPTURED</text>
  <text x="438" y="442" font-family="Arial Black,Arial,sans-serif" font-size="12" font-weight="900" fill="white">WAVEFORM</text>

  <!-- PQ ALARM RESET -->
  <rect x="390" y="482" width="162" height="60" rx="10" fill="url(#sidePanelGrad)" stroke="#283a68" stroke-width="1.5"/>
  <circle cx="414" cy="512" r="17" fill="url(#pushCapGrad)" stroke="#3a4a78" stroke-width="1.8"/>
  <circle cx="414" cy="512" r="10" fill="#0c1222" stroke="#243058" stroke-width="1"/>
  <circle cx="414" cy="489" r="4.5" fill="#181818" stroke="#3a3a3a" stroke-width="0.8"/>
  <text x="438" y="491" font-family="Arial,sans-serif" font-size="7.8" fill="#7898c0">PQ ALARM</text>
  <text x="438" y="510" font-family="Arial Black,Arial,sans-serif" font-size="12" font-weight="900" fill="white">RESET</text>

</svg>