<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SER Records Viewer</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tabulator CSS - Light Theme -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #eef2f6;
            --surface: #ffffff;
            --surface-soft: rgba(255, 255, 255, 0.7);
            --ink: #0f172a;
            --muted: #5b6477;
            --accent: #0ea5a4;
            --accent-2: #f97316;
            --accent-3: #2563eb;
            --border: rgba(148, 163, 184, 0.35);
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }
        
        body {
            font-family: "Sora", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 164, 0.2), transparent 45%),
                radial-gradient(circle at top right, rgba(249, 115, 22, 0.16), transparent 40%),
                repeating-linear-gradient(120deg, rgba(15, 23, 42, 0.04) 0px, rgba(15, 23, 42, 0.04) 1px, transparent 1px, transparent 60px),
                var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 28px 20px 40px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 24px;
            margin-bottom: 28px;
            padding: 26px 28px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.94));
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--accent);
        }

        h1 {
            color: var(--ink);
            font-size: 2.2rem;
            margin: 6px 0 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .hero-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ink);
            background: rgba(14, 165, 164, 0.12);
            border: 1px solid rgba(14, 165, 164, 0.35);
        }

        .chip.alt {
            background: rgba(249, 115, 22, 0.12);
            border: 1px solid rgba(249, 115, 22, 0.35);
        }
        
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 16px 18px;
            background: var(--surface-soft);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(6px);
        }

        .toolbar-left {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            color: var(--ink);
            font-size: 0.92rem;
        }

        .toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .hero-text {
            max-width: 520px;
        }
        
        .record-count {
            color: var(--accent-3);
            font-weight: 700;
        }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(120deg, var(--accent-3), #38bdf8);
            color: #ffffff;
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.22);
        }

        .btn-primary:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28);
        }
        
        .btn-secondary {
            background: #ffffff;
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.12);
        }
        
        #ser-table {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            background: #ffffff;
            animation: rise 0.6s ease;
        }
        
        /* Custom Tabulator styling - Light Theme */
        .tabulator {
            background: #ffffff;
            border: none;
        }

        .tabulator-header {
            background: #f8fafc;
            border-bottom: 2px solid rgba(37, 99, 235, 0.25);
        }

        .tabulator-col {
            background: #f8fafc;
        }

        .tabulator-col-title {
            color: #0f172a;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tabulator-row {
            border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        }

        .tabulator-row:hover {
            background: rgba(14, 165, 164, 0.08) !important;
        }

        .tabulator-cell {
            color: #1f2937;
            font-size: 0.9rem;
        }
        
        /* Status badge styling */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-active {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-inactive {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .status-event {
            background: #fef3c7;
            color: #d97706;
        }
        
        .last-update {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .config-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: var(--surface-soft);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(6px);
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink);
            font-size: 0.9rem;
        }

        .config-group label {
            font-weight: 600;
            color: var(--muted);
        }

        .config-input {
            padding: 9px 12px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            border-radius: 10px;
            font-size: 0.9rem;
            min-width: 150px;
            font-family: "JetBrains Mono", "Consolas", monospace;
            background: #ffffff;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        .config-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(14, 165, 164, 0.15);
        }

        .config-suffix {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .toolbar-right {
                width: 100%;
            }

            .config-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .config-group {
                justify-content: space-between;
                width: 100%;
            }

            .config-input {
                min-width: 0;
                width: 100%;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease both;
        }

        .fade-in.delay {
            animation-delay: 0.1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero fade-in">
            <div class="hero-text">
                <span class="hero-kicker">Live Monitoring</span>
                <h1>⚡ SER Records Viewer</h1>
                <p class="subtitle">System Event Records - Real-time Monitoring</p>
            </div>
        </header>
        
        <div class="toolbar fade-in delay">
            <div class="toolbar-left">
                <span>Total Records: <span id="record-count" class="record-count">0</span></span>
                <span class="last-update">Last updated: <span id="last-update">-</span></span>
                <span id="connection-status" style="font-weight: bold;">🟡 Connecting...</span>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-secondary" onclick="exportCSV()">📥 Export CSV</button>
                <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="config-bar fade-in delay">
            <div class="config-group">
                <label for="ip-address">IP Address</label>
                <input class="config-input" id="ip-address" type="text" value="localhost" placeholder="192.168.1.10">
            </div>
            <div class="config-group">
                <label for="ws-port">WebSocket Port</label>
                <input class="config-input" id="ws-port" type="number" min="1" max="65535" value="8765">
            </div>
            <div class="config-group">
                <label for="poll-rate">Poll Rate</label>
                <input class="config-input" id="poll-rate" type="number" min="250" step="250" value="2000">
                <span class="config-suffix">ms</span>
            </div>
        </div>
        
        <div id="ser-table"></div>
    </div>
    
    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <script>
        let table;
        const WS_URL = 'ws://localhost:8765';
        const textDecoder = new TextDecoder();
        const pollRateInput = document.getElementById('poll-rate');
        let lastMessageAt = 0;
        let shmRing = null;
        let shmWorker = null;
        let workerConnected = false;
        let directWs = null;  // Direct WebSocket connection
        const useSharedArrayBuffer = false;  // Default to direct WebSocket for SER data

        function readLength(buffer, offset) {
            const first = buffer[offset];
            if ((first & 0x80) === 0) {
                return { length: first, nextOffset: offset + 1 };
            }

            const count = first & 0x7f;
            if (count === 0 || offset + count >= buffer.length) {
                throw new Error('Invalid BER length');
            }

            let value = 0;
            for (let i = 0; i < count; i += 1) {
                value = (value << 8) | buffer[offset + 1 + i];
            }

            return { length: value, nextOffset: offset + 1 + count };
        }

        function readTlv(buffer, offset) {
            const tag = buffer[offset];
            const constructed = (tag & 0x20) !== 0;
            const lengthInfo = readLength(buffer, offset + 1);
            const valueStart = lengthInfo.nextOffset;
            const tlvLen = (valueStart - offset) + lengthInfo.length;

            return {
                tag,
                constructed,
                valueStart,
                length: lengthInfo.length,
                nextOffset: valueStart + lengthInfo.length,
                tlvLen
            };
        }

        function decodeSerRecordsFromTlv(arrayBuffer) {
            const buffer = new Uint8Array(arrayBuffer);
            let offset = 0;
            const topLevel = readTlv(buffer, offset);

            if (topLevel.tag !== 0x61) {
                throw new Error('Unexpected TLV tag');
            }

            const records = [];
            offset = topLevel.valueStart;
            const end = topLevel.valueStart + topLevel.length;

            while (offset < end) {
                const recordTlv = readTlv(buffer, offset);
                if (recordTlv.tag !== 0x30) {
                    offset = recordTlv.nextOffset;
                    continue;
                }

                const fields = {};
                let recordOffset = recordTlv.valueStart;
                const recordEnd = recordTlv.valueStart + recordTlv.length;

                while (recordOffset < recordEnd) {
                    const fieldTlv = readTlv(buffer, recordOffset);
                    const valueBytes = buffer.slice(fieldTlv.valueStart, fieldTlv.valueStart + fieldTlv.length);
                    const value = textDecoder.decode(valueBytes);

                    if (fieldTlv.tag === 0x80) {
                        fields.recordId = value;
                    } else if (fieldTlv.tag === 0x81) {
                        fields.timestamp = value;
                    } else if (fieldTlv.tag === 0x82) {
                        fields.status = value;
                    } else if (fieldTlv.tag === 0x83) {
                        fields.description = value;
                    }

                    recordOffset = fieldTlv.nextOffset;
                }

                const timestamp = fields.timestamp || '';
                let date = timestamp || '-';
                let time = '-';
                const spacePos = timestamp.indexOf(' ');
                if (spacePos !== -1) {
                    date = timestamp.slice(0, spacePos);
                    time = timestamp.slice(spacePos + 1);
                }

                const snoValue = Number.parseInt(fields.recordId, 10);
                records.push({
                    sno: Number.isNaN(snoValue) ? (fields.recordId || '-') : snoValue,
                    date,
                    time,
                    element: fields.description || '-',
                    state: fields.status || '-'
                });

                offset = recordTlv.nextOffset;
            }

            return records;
        }

        function createSharedRingBuffer(capacity) {
            const headerBytes = 12; // writeIndex, readIndex, signal
            const buffer = new SharedArrayBuffer(headerBytes + capacity);
            const header = new Int32Array(buffer, 0, 3);
            const data = new Uint8Array(buffer, headerBytes, capacity);
            const view = new DataView(buffer, headerBytes, capacity);

            header[0] = 0;
            header[1] = 0;
            header[2] = 0;

            function readLength(pos) {
                return view.getUint32(pos, true);
            }

            function readPayload() {
                const readPos = Atomics.load(header, 1);
                const writePos = Atomics.load(header, 0);
                if (readPos === writePos) {
                    return null;
                }

                let pos = readPos;
                if (pos + 4 > capacity) {
                    pos = 0;
                }

                let len = readLength(pos);
                if (len === 0 || len > capacity - 4) {
                    Atomics.store(header, 1, writePos);
                    return null;
                }

                if (pos + 4 + len > capacity) {
                    pos = 0;
                    if (pos === writePos) {
                        Atomics.store(header, 1, pos);
                        return null;
                    }
                    len = readLength(pos);
                    if (len === 0 || len > capacity - 4) {
                        Atomics.store(header, 1, writePos);
                        return null;
                    }
                }

                const payload = data.slice(pos + 4, pos + 4 + len);
                let newRead = pos + 4 + len;
                if (newRead >= capacity) {
                    newRead = 0;
                }
                Atomics.store(header, 1, newRead);
                return payload;
            }

            return {
                buffer,
                capacity,
                header,
                readPayload,
                readerRunning: false
            };
        }

        function buildWsUrl() {
            const hostInput = document.getElementById('ip-address');
            const portInput = document.getElementById('ws-port');
            const host = hostInput ? hostInput.value.trim() : '';
            const port = portInput ? portInput.value.trim() : '';
            if (host && port) {
                return `ws://${host}:${port}`;
            }
            return WS_URL;
        }

        function startRingReader() {
            if (!shmRing || shmRing.readerRunning) {
                return;
            }

            shmRing.readerRunning = true;
            let lastSignal = Atomics.load(shmRing.header, 2);

            const pump = async () => {
                while (shmRing && shmRing.readerRunning) {
                    if (typeof Atomics.waitAsync === 'function') {
                        const result = Atomics.waitAsync(shmRing.header, 2, lastSignal);
                        if (result && result.value && typeof result.value.then === 'function') {
                            await result.value;
                        } else {
                            await new Promise((resolve) => setTimeout(resolve, 50));
                        }
                    } else {
                        await new Promise((resolve) => setTimeout(resolve, 50));
                    }

                    const current = Atomics.load(shmRing.header, 2);
                    if (current === lastSignal) {
                        continue;
                    }
                    lastSignal = current;

                    let payload = shmRing.readPayload();
                    while (payload) {
                        try {
                            const tlvBuffer = payload.buffer.slice(payload.byteOffset, payload.byteOffset + payload.byteLength);
                            const records = decodeSerRecordsFromTlv(tlvBuffer);
                            updateTable(records);
                            lastMessageAt = Date.now();
                            dataReceived = true;
                            updateConnectionStatus('connected');
                        } catch (err) {
                            console.error('Shared ring decode error:', err);
                        }
                        payload = shmRing.readPayload();
                    }
                }
            };

            pump();
        }

        function setupSharedRing() {
            if (!useSharedArrayBuffer) {
                console.warn('SharedArrayBuffer not available, using direct WebSocket fallback');
                return;
            }
            shmRing = createSharedRingBuffer(500 * 1024);
            shmWorker = new Worker('shm_worker.js');
            shmWorker.postMessage({
                type: 'init',
                buffer: shmRing.buffer,
                capacity: shmRing.capacity
            });

            shmWorker.onmessage = (event) => {
                const msg = event.data;
                if (!msg || !msg.type) {
                    return;
                }

                if (msg.type === 'ws_status') {
                    workerConnected = msg.status === 'connected';
                    if (msg.status === 'disconnected' && dataReceived) {
                        updateConnectionStatus('synced');
                    } else {
                        updateConnectionStatus(msg.status);
                    }
                    if (workerConnected) {
                        startAutoRefresh();
                    } else if (msg.status === 'disconnected') {
                        stopAutoRefresh();
                        // Fallback: try loading from data.json
                        if (!dataReceived) loadFromJsonFallback();
                    }
                } else if (msg.type === 'error') {
                    console.error('Shared ring worker error:', msg.message);
                    if (!dataReceived) loadFromJsonFallback();
                }
            };

            shmWorker.onerror = (event) => {
                console.error('Shared ring worker error:', event.message);
            };

            startRingReader();
        }
        
        // Status formatter
        function statusFormatter(cell) {
            const value = cell.getValue();
            let statusClass = 'status-event';
            let displayValue = value || '-';
            
            if (value === 'Asserted') {
                statusClass = 'status-active';
            } else if (value === 'Deasserted') {
                statusClass = 'status-inactive';
            }
            
            return `<span class="status-badge ${statusClass}">${displayValue}</span>`;
        }
        
        // Initialize Tabulator
        function initTable(data) {
            table = new Tabulator("#ser-table", {
                data: data,
                index: "sno",
                layout: "fitColumns",
                responsiveLayout: "collapse",
                pagination: true,
                paginationSize: 50,
                paginationSizeSelector: [10, 20, 50, 100],
                movableColumns: true,
                placeholder: "No Records Available",
                columns: [
                    {
                        title: "S.No",
                        field: "sno",
                        width: 80,
                        hozAlign: "center",
                        headerSort: true,
                        sorter: "number"
                    },
                    {
                        title: "Date",
                        field: "date",
                        width: 120,
                        hozAlign: "center",
                        headerSort: true
                    },
                    {
                        title: "Time",
                        field: "time",
                        width: 100,
                        hozAlign: "center",
                        headerSort: true
                    },
                    {
                        title: "Element",
                        field: "element",
                        minWidth: 300,
                        headerSort: true
                    },
                    {
                        title: "State",
                        field: "state",
                        width: 120,
                        hozAlign: "center",
                        formatter: statusFormatter,
                        headerSort: true
                    }
                ],
                initialSort: [
                    { column: "sno", dir: "asc" }
                ]
            });
            
            document.getElementById('record-count').textContent = data.length;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }

        function updateTable(data) {
            if (table) {
                table.updateOrAddData(data);
            } else {
                initTable(data);
            }

            const totalRows = table ? table.getDataCount() : data.length;
            document.getElementById('record-count').textContent = totalRows;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }
        
        // WebSocket connection (handled by worker or direct fallback)
        function connectWebSocket() {
            updateConnectionStatus('connecting');
            
            // Use direct WebSocket if SharedArrayBuffer not available
            if (!useSharedArrayBuffer) {
                connectDirectWebSocket();
                return;
            }
            
            if (!shmWorker) {
                console.warn('Shared ring worker not initialized');
                return;
            }
            shmWorker.postMessage({
                type: 'connect',
                wsUrl: buildWsUrl()
            });
        }
        
        // Direct WebSocket fallback when SharedArrayBuffer is unavailable
        function connectDirectWebSocket() {
            if (directWs) {
                directWs.close();
            }
            
            const wsUrl = buildWsUrl();
            directWs = new WebSocket(wsUrl);
            directWs.binaryType = 'arraybuffer';
            
            directWs.onopen = () => {
                workerConnected = true;
                updateConnectionStatus('connected');
                startAutoRefresh();
            };
            
            directWs.onmessage = async (event) => {
    try {
        console.log('--------------------------------------------------');
        console.log('[WS] Message received. Type:', typeof event.data);

        let bytes;

        // 🔹 Handle Blob
        if (event.data instanceof Blob) {
            console.log('[WS] Received Blob:', event.data.size, 'bytes');
            const arrayBuffer = await event.data.arrayBuffer();
            bytes = new Uint8Array(arrayBuffer);
        }

        // 🔹 Handle ArrayBuffer
        else if (event.data instanceof ArrayBuffer) {
            console.log('[WS] Received ArrayBuffer:', event.data.byteLength, 'bytes');
            bytes = new Uint8Array(event.data);
        }

        // 🔹 Handle Text
        else {
            console.log('[WS] Received Text:', event.data);

            try {
                const jsonData = JSON.parse(event.data);
                if (Array.isArray(jsonData)) {
                    console.log('[WS] Parsed JSON records:', jsonData.length);
                    updateTable(jsonData);
                    dataReceived = true;
                }
            } catch (e) {
                console.warn('[WS] Non-JSON text message:', event.data);
            }

            return;
        }

        if (!bytes || bytes.length === 0) {
            console.warn('[WS] Empty binary payload');
            return;
        }

        console.log('[WS] Binary length:', bytes.length);
        console.log('[WS] First 20 bytes:', Array.from(bytes.slice(0, 20)));

        // 🔴 CRITICAL FIX: Slice exact payload region
        const exactBuffer = bytes.buffer.slice(
            bytes.byteOffset,
            bytes.byteOffset + bytes.byteLength
        );

        // 🔍 Validate TLV header
        const firstByte = bytes[0];
        console.log('[WS] First byte (should be 0x61):', '0x' + firstByte.toString(16));

        if (firstByte !== 0x61) {
            console.warn('[WS] Unexpected TLV tag. Not APPLICATION 1 (0x61)');
        }

        // 🔹 Decode TLV
        const records = decodeSerRecordsFromTlv(exactBuffer);

        console.log('[WS] Decoded records count:', records.length);
        console.log('[WS] Records:', records);

        if (records.length > 0) {
            updateTable(records);
            dataReceived = true;
        } else {
            console.warn('[WS] TLV decoded but returned 0 records');
        }

    } catch (err) {
        console.error('[WS] Direct WebSocket decode error:', err);
    }
};
            
            directWs.onclose = () => {
                workerConnected = false;
                if (dataReceived) {
                    updateConnectionStatus('synced');
                } else {
                    updateConnectionStatus('disconnected');
                    // Fallback: try loading from data.json
                    loadFromJsonFallback();
                }
                stopAutoRefresh();
                // Attempt reconnect after delay
                setTimeout(() => {
                    if (!workerConnected) {
                        connectDirectWebSocket();
                    }
                }, 3000);
            };
            
            directWs.onerror = (err) => {
                console.error('Direct WebSocket error:', err);
                updateConnectionStatus('error');
                // Fallback: try loading from data.json
                if (!dataReceived) loadFromJsonFallback();
            };
        }
        
        let dataReceived = false;  // Track if data was received
        let jsonFallbackAttempted = false;  // Track if we already tried data.json
        
        // Fallback: load records from data.json when WebSocket is unavailable
        async function loadFromJsonFallback() {
            if (jsonFallbackAttempted && dataReceived) return;
            jsonFallbackAttempted = true;
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const records = await resp.json();
                if (Array.isArray(records) && records.length > 0) {
                    updateTable(records);
                    dataReceived = true;
                    updateConnectionStatus('synced');
                    console.log('[Fallback] Loaded', records.length, 'records from data.json');
                }
            } catch (err) {
                console.warn('[Fallback] Could not load data.json:', err.message);
            }
        }
        
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connection-status');
            const statusMap = {
                'connecting': { text: '🟡 Connecting...', color: '#d97706' },
                'connected': { text: '🟢 Connected', color: '#16a34a' },
                'synced': { text: '🟢 Data Synced', color: '#16a34a' },
                'disconnected': { text: '🔴 Disconnected', color: '#dc2626' },
                'error': { text: '🔴 Error', color: '#dc2626' }
            };
            
            const info = statusMap[status] || statusMap['disconnected'];
            statusEl.textContent = info.text;
            statusEl.style.color = info.color;
        }
        
        // Refresh data via WebSocket
        function refreshData() {
            if (!useSharedArrayBuffer) {
                // Direct WebSocket fallback
                if (directWs && directWs.readyState === WebSocket.OPEN) {
                    directWs.send('refresh');
                } else {
                    console.log('WebSocket not connected, attempting reconnect...');
                    connectDirectWebSocket();
                }
                return;
            }
            
            if (shmWorker && workerConnected) {
                shmWorker.postMessage({ type: 'send', payload: 'refresh' });
            } else {
                console.log('WebSocket not connected, attempting reconnect...');
                connectWebSocket();
            }
        }
        
        // Export to CSV
        function exportCSV() {
            if (table) {
                table.download("csv", "ser_records.csv");
            }
        }
        
        // Auto-refresh interval (fallback poll when no push data arrives)
        let autoRefreshInterval = null;
        
        function startAutoRefresh() {
            const rate = Number.parseInt(pollRateInput.value, 10) || 2000;
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => {
                const now = Date.now();
                if (now - lastMessageAt < rate) {
                    return;
                }
                // Direct WebSocket path
                if (!useSharedArrayBuffer) {
                    if (directWs && directWs.readyState === WebSocket.OPEN) {
                        directWs.send('getData');
                    }
                    return;
                }
                // Shared memory worker path
                if (shmWorker && workerConnected) {
                    shmWorker.postMessage({ type: 'send', payload: 'getData' });
                }
            }, rate);
        }
        
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        pollRateInput.addEventListener('change', () => {
            if (workerConnected) {
                startAutoRefresh();
            }
        });
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initTable([]);  // Initialize empty table
            setupSharedRing();
            connectWebSocket();
            // Also try loading data.json immediately as a fast-path
            // (records show instantly while WebSocket connects)
            loadFromJsonFallback();
        });
    </script>
</body>
</html>
